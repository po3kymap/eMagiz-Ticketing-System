# Nginx: отдаёт собранный фронт (Vite) и проксирует API на Tomcat.
#
# Ожидается в Docker:
#   - этот файл → /etc/nginx/conf.d/default.conf
#   - содержимое frontend/dist → /usr/share/nginx/html
#   - сервис Tomcat в сети compose называется `app`, порт 8080
#
# Перед запуском: cd frontend && npm run build
# (лучше outDir: "dist" в vite.config.js, не класть WEB-INF в nginx)

upstream tomcat {
    server app:8080;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Jersey: /api/users, /api/tickets (см. WEB-INF/web.xml)
    location /api/ {
        proxy_pass http://tomcat;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Vite assets
    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA (vue-router hash: /#/customer — try_files)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
